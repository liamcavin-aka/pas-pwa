<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PAS</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>Personal Agency Scorecard</h1>

<div class="scorecard">

<div class="pillar">

<h2>Economic Stability</h2>

<label><input type="checkbox" class="score"> Avoided unnecessary spending</label>
<label><input type="checkbox" class="score"> Strengthened income skills</label>
<label><input type="checkbox" class="score"> Reviewed finances</label>

</div>

<div class="pillar">

<h2>Intellectual Development</h2>

<label><input type="checkbox" class="score"> 30 min learning</label>
<label><input type="checkbox" class="score"> Limited mindless media</label>
<label><input type="checkbox" class="score"> Recorded insight</label>

</div>

<div class="pillar">

<h2>Social Relationships</h2>

<label><input type="checkbox" class="score"> Strengthened relationship</label>
<label><input type="checkbox" class="score"> Avoided draining influence</label>
<label><input type="checkbox" class="score"> Contributed positively</label>

</div>

<div class="pillar">

<h2>Discipline & Health</h2>

<label><input type="checkbox" class="score"> Exercised</label>
<label><input type="checkbox" class="score"> Protected sleep</label>
<label><input type="checkbox" class="score"> Kept promise to self</label>

</div>

<div class="pillar">

<h2>Agency</h2>

<label><input type="checkbox" class="score"> Long-term decision</label>
<label><input type="checkbox" class="score"> Planned tomorrow</label>
<label><input type="checkbox" class="score"> Said no to distraction</label>

</div>

</div>

<div class="results">

<h2>Total Score</h2>

<div id="total">0 / 15</div>

<h2>Daily Agency Score</h2>

<div id="agencyScore">0 / 100</div>

<div class="target">
Target: +1 point per week
</div>

</div>

<button onclick="saveDay()">Save Today</button>

<h2>Weekly Streak</h2>

<div id="streak">0 weeks</div>

<script src="app.js"></script>

</body>
</html>
